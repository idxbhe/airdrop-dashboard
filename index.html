<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRDROP_TERMINAL v16.5</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/906/906334.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <div class="logo">AIRDROP_TERMINAL <span style="font-size: 10px; opacity: 0.5;">v16.5</span></div>
        <div class="top-actions">
            <input type="text" class="search-input" id="searchInput" placeholder="Search tasks...">
            <button class="btn btn-accent" onclick="openCatModal()">📂 NEW CATEGORY</button>
        </div>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center;">
                <span>KATEGORI</span>
                <span onclick="toggleCategoryEditMode()" style="cursor: pointer; font-size: 14px; opacity: 0.7;" title="Edit Categories">⚙️</span>
            </div>
            <ul id="categoryList" class="category-list"></ul>
        </aside>

        <main class="main-panel">
            <div class="panel-header">
                <span id="currentCategoryName">Memuat...</span>
                <button class="btn btn-accent" onclick="openEntryModal()" style="margin-left:auto; font-size:11px;">➕ ADD ENTRY</button>
            </div>
            <div class="entries-list" id="entriesList"></div>
        </main>

        <div class="resizer"></div>

        <section class="detail-panel">
            <div class="detail-header">
                <span>DETAIL & CATATAN</span>
                <div class="detail-controls">
                    <button class="btn btn-small" onclick="editCurrentItem()">✏️ Edit</button>
                    <button class="btn btn-small btn-danger" onclick="deleteCurrentItem()">🗑️</button>
                </div>
            </div>
            <div id="detailContent" class="detail-content">
                <div class="empty-state">Pilih entri untuk melihat detail</div>
            </div>
        </section>
    </div>

    <div class="modal-overlay" id="entryModal">
        <div class="modal" style="width:520px;">
            <h3>MANAGE ENTRY</h3>
            <input type="text" id="inpT" placeholder="Judul / Nama Tugas">
            <input type="text" id="inpU" placeholder="URL (contoh: grok.com)">
            <textarea id="inpN" placeholder="Catatan atau instruksi tambahan..." rows="6"></textarea>
            
            <div class="settings-grid">
                <!-- Checkbox & fields akan dibuat dynamically di JS -->
            </div>

            <div class="modal-foot">
                <button class="btn" onclick="closeModal('entryModal')">CANCEL</button>
                <button class="btn btn-accent" onclick="handleSaveEntry()">SAVE CHANGES</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="catModal">
        <div class="modal">
            <h3>NEW CATEGORY</h3>
            <input type="text" id="inpCatName" placeholder="Nama Kategori (ex: Testnet, Nodes)">
            <div class="modal-foot">
                <button class="btn" onclick="closeModal('catModal')">CANCEL</button>
                <button class="btn btn-accent" onclick="submitCat()">CREATE</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
