<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airdrop Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/badges.css">
    <link rel="stylesheet" href="css/modals.css">
    
    <link rel="stylesheet" href="css/list-view.css">
    <link rel="stylesheet" href="css/detail-view.css">
    <link rel="stylesheet" href="css/markdown.css">
</head>
<body>

    <header class="top-bar">
        <div class="logo">Airdrop Dashboard <span style="font-size: 10px; opacity: 0.5;">v16.5</span></div>
        <div class="top-actions" style="display: flex; gap: 8px; align-items: center;">
            <button class="btn btn-small" onclick="exportData()" title="Export Data" style="padding: 4px 8px; font-size: 11px;">📤 EXPORT</button>
            <button class="btn btn-small" onclick="document.getElementById('importFile').click()" title="Import Data" style="padding: 4px 8px; font-size: 11px;">📥 IMPORT</button>
            <input type="file" id="importFile" style="display: none;" accept=".json" onchange="importData(event)">
            <input type="text" class="search-input" id="searchInput" placeholder="Search tasks...">
        </div>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center;">
                <span>KATEGORI</span>
                <div style="display: flex; gap: 6px;">
                    <button class="icon-btn" onclick="openCatModal()" title="New Category">➕</button>
                    <button class="icon-btn" onclick="toggleCategoryEditMode()" title="Edit Categories">⚙️</button>
                </div>
            </div>
            <ul id="categoryList" class="category-list"></ul>
        </aside>

        <main class="main-panel">
            <div class="panel-header">
                <span id="currentCategoryName">Memuat...</span>
                <button class="btn btn-accent" onclick="openEntryModal()" style="margin-left:auto; font-size:11px;">➕ ADD ENTRY</button>
            </div>
            <div class="entries-list" id="entriesList"></div>
        </main>

        <div class="resizer"></div>

        <section class="detail-panel">
            <div class="detail-header">
                <span>DETAIL & CATATAN</span>
                <div class="detail-controls">
                    <button class="btn btn-small" onclick="editCurrentItem()">✏️ Edit</button>
                    <button class="btn btn-small btn-danger" onclick="deleteCurrentItem()">🗑️</button>
                </div>
            </div>
            <div id="detailContent" class="detail-content">
                <div class="empty-state">Pilih entri untuk melihat detail</div>
            </div>
        </section>
    </div>

    <div class="modal-overlay" id="entryModal">
        <div class="modal" style="width:700px;">
            <h3>MANAGE ENTRY</h3>
            <input type="text" id="inpT" placeholder="Judul / Nama Tugas">
            <input type="text" id="inpU" placeholder="URL (contoh: grok.com)">
            <textarea id="inpN" placeholder="Catatan atau instruksi tambahan..." rows="12"></textarea>
            
            <div class="settings-grid">
                </div>

            <div class="modal-foot">
                <button class="btn" onclick="closeModal('entryModal')">CANCEL</button>
                <button class="btn btn-accent" onclick="handleSaveEntry()">SAVE CHANGES</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="catModal">
        <div class="modal">
            <h3>NEW CATEGORY</h3>
            <input type="text" id="inpCatName" placeholder="Nama Kategori (ex: Testnet, Nodes)">
            <div class="modal-foot">
                <button class="btn" onclick="closeModal('catModal')">CANCEL</button>
                <button class="btn btn-accent" onclick="submitCat()">CREATE</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="noteModal">
        <div class="modal modal-large">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 id="noteModalTitle" style="margin: 0; color: var(--accent);">CATATAN</h3>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-accent" id="btnToggleNoteEdit" onclick="toggleNoteEdit()">✏️ Mode Edit</button>
                    <button class="btn btn-danger" onclick="closeModal('noteModal')">✖ Tutup</button>
                </div>
            </div>
            
            <div id="noteViewArea" class="detail-note modal-body-flex"></div>
            
            <textarea id="noteEditArea" class="note-editor-area mono-font" style="display: none;" placeholder="Ketik catatan di sini..."></textarea>
            
            <div class="modal-foot" id="noteEditControls" style="display: none; margin-top: 15px;">
                <button class="btn" onclick="toggleNoteEdit()">BATAL</button>
                <button class="btn btn-accent" onclick="saveNoteFromModal()">SIMPAN CATATAN</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
