<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="icon" type="image/png" href="https://e7.pngegg.com/pngimages/710/283/png-clipart-computer-icons-command-line-interface-cmd-exe-save-command-line-miscellaneous-angle.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <div class="logo">AIRDROP_TERMINAL</div>
        <div style="display: flex; gap: 8px;">
            <input type="text" class="search-input" id="searchInput" placeholder="Search entries...">
            <button class="btn btn-accent" onclick="openCatModal()">📂 NEW CATEGORY</button>
            <button class="btn" id="masterEditBtn" onclick="toggleEdit()">⚙️ EDIT MODE: OFF</button>
        </div>
    </header>

    <div class="board" id="mainBoard"></div>

    <div class="modal-overlay" id="entryModal">
        <div class="modal">
            <h3>ADD / EDIT ENTRY</h3>
            
            <div style="display:flex; gap:8px; align-items:center;">
                <input type="text" id="inpT" placeholder="Title" style="flex:1;">
                <button class="btn" onclick="fetchTitleManual()" style="padding:8px 12px; font-size:13px;">🔍 Fetch Title</button>
            </div>
            
            <input type="text" id="inpU" placeholder="URL[](https://...)" oninput="autoCompleteUrl()">
            <textarea id="inpN" placeholder="Notes/Description (Optional)" rows="3"></textarea>
            
            <label style="font-size:12px;color:var(--text-dim);margin:8px 0 4px;display:block;">Reset Type</label>
            <select id="inpReset" onchange="handleResetTypeChange()">
                <option value="">No Reset</option>
                <option value="checklist">✅ Checklist Only</option>
                <option value="daily">Daily Reset (24 jam)</option>
                <option value="weekly">Weekly Reset</option>
                <option value="monthly">Monthly Reset</option>
                <optgroup label="Daily Clock Reset">
                    <option value="clock:00:00">Reset jam 00:00</option>
                    <option value="clock:06:00">Reset jam 06:00</option>
                    <option value="clock:12:00">Reset jam 12:00</option>
                    <option value="clock:18:00">Reset jam 18:00</option>
                    <option value="custom">Custom Clock...</option>
                </optgroup>
            </select>
            <input type="time" id="inpCustomTime" style="display:none;margin-top:8px;" />

            <div class="modal-foot">
                <button class="btn" onclick="closeModal('entryModal')">CANCEL</button>
                <button class="btn btn-accent" id="btnSaveItem">SAVE ENTRY</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="catModal">
        <div class="modal">
            <h3>CREATE CATEGORY</h3>
            <input type="text" id="inpCatName" placeholder="Category Name">
            <div class="modal-foot">
                <button class="btn" onclick="closeModal('catModal')">CANCEL</button>
                <button class="btn btn-accent" onclick="submitCat()">CREATE</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
